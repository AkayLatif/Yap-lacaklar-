<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Yapılacaklar Listesi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            flex: 1;
            min-width: 80px;
            padding: 15px 10px;
            text-align: center;
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: #667eea;
            background: white;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #667eea;
            border-radius: 3px 3px 0 0;
        }

        .content {
            padding: 20px;
            min-height: 400px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-add:active {
            transform: scale(0.98);
        }

        .items-list {
            margin-top: 20px;
        }

        .item {
            background: #fff5f5;
            border: 2px solid #fc8181;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .item.completed {
            background: #f0fff4;
            border-color: #48bb78;
            text-decoration: line-through;
            opacity: 0.9;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #fc8181;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s;
            background: white;
        }

        .item.completed .checkbox {
            background: #48bb78;
            border-color: #48bb78;
        }

        .checkbox::after {
            content: '✓';
            color: white;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .item.completed .checkbox::after {
            opacity: 1;
        }

        .item-content {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            color: #c53030;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .item.completed .item-title {
            color: #22543d;
        }

        .item-desc {
            color: #718096;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .date-input {
            display: none;
            margin-top: 8px;
        }

        .item.completed .date-input {
            display: block;
        }

        .date-input input {
            padding: 8px 12px;
            border: 1px solid #48bb78;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            color: #22543d;
        }

        .btn-delete {
            background: #fed7d7;
            color: #c53030;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-delete:active {
            background: #fc8181;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* Adım sayısı badge */
        .step-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📋 Yapılacaklar Listesi</h1>
        <p style="opacity: 0.9; font-size: 14px;">Hayatını organize et</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('todo')">Yapılacaklar</button>
        <button class="tab" onclick="switchTab('visit')">Gezilecekler</button>
        <button class="tab" onclick="switchTab('buy')">Alınacaklar</button>
        <button class="tab" onclick="switchTab('steps')">Faal Adımları</button>
    </div>

    <div class="content">
        <!-- Yapılacaklar Sekmesi -->
        <div id="todo" class="tab-content active">
            <div class="input-group">
                <input type="text" id="todo-title" placeholder="Başlık (örn: Fatura öde)">
                <textarea id="todo-desc" placeholder="Açıklama (isteğe bağlı)"></textarea>
                <button class="btn-add" onclick="addItem('todo')">+ Ekle</button>
            </div>
            <div class="items-list" id="todo-list"></div>
        </div>

        <!-- Gezilecekler Sekmesi -->
        <div id="visit" class="tab-content">
            <div class="input-group">
                <input type="text" id="visit-title" placeholder="Yer (örn: Ayasofya)">
                <textarea id="visit-desc" placeholder="Notlar (isteğe bağlı)"></textarea>
                <button class="btn-add" onclick="addItem('visit')">+ Ekle</button>
            </div>
            <div class="items-list" id="visit-list"></div>
        </div>

        <!-- Alınacaklar Sekmesi -->
        <div id="buy" class="tab-content">
            <div class="input-group">
                <input type="text" id="buy-title" placeholder="Ürün (örn: Süt)">
                <textarea id="buy-desc" placeholder="Detaylar (isteğe bağlı)"></textarea>
                <button class="btn-add" onclick="addItem('buy')">+ Ekle</button>
            </div>
            <div class="items-list" id="buy-list"></div>
        </div>

        <!-- Faal Adımları Sekmesi -->
        <div id="steps" class="tab-content">
            <div class="input-group">
                <input type="text" id="steps-title" placeholder="Adım (örn: Evrakları hazırla)">
                <textarea id="steps-desc" placeholder="Adım detayı (isteğe bağlı)"></textarea>
                <button class="btn-add" onclick="addItem('steps')">+ Ekle</button>
            </div>
            <div class="items-list" id="steps-list"></div>
        </div>
    </div>
</div>

<script>
    // Veri saklama
    let data = {
        todo: [],
        visit: [],
        buy: [],
        steps: []
    };

    // Sayfa yüklendiğinde localStorage'dan veri çek
    window.onload = function() {
        const saved = localStorage.getItem('todoAppData');
        if (saved) {
            data = JSON.parse(saved);
            renderAll();
        }
    };

    // Veriyi kaydet
    function saveData() {
        localStorage.setItem('todoAppData', JSON.stringify(data));
    }

    // Sekme değiştirme
    function switchTab(tabName) {
        // Tüm sekmeleri pasif yap
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        
        // Seçili sekmeyi aktif yap
        event.target.classList.add('active');
        document.getElementById(tabName).classList.add('active');
    }

    // Öğe ekleme
    function addItem(category) {
        const titleInput = document.getElementById(`${category}-title`);
        const descInput = document.getElementById(`${category}-desc`);
        
        const title = titleInput.value.trim();
        if (!title) {
            alert('Lütfen bir başlık girin!');
            return;
        }

        const item = {
            id: Date.now(),
            title: title,
            description: descInput.value.trim(),
            completed: false,
            date: ''
        };

        data[category].push(item);
        saveData();
        
        // Inputları temizle
        titleInput.value = '';
        descInput.value = '';
        
        renderList(category);
    }

    // Öğe silme
    function deleteItem(category, id) {
        data[category] = data[category].filter(item => item.id !== id);
        saveData();
        renderList(category);
    }

    // Tamamlama durumu değiştirme
    function toggleComplete(category, id) {
        const item = data[category].find(i => i.id === id);
        if (item) {
            item.completed = !item.completed;
            if (!item.completed) {
                item.date = ''; // Tamamlama kaldırılınca tarihi de sil
            }
            saveData();
            renderList(category);
        }
    }

    // Tarih güncelleme
    function updateDate(category, id, dateValue) {
        const item = data[category].find(i => i.id === id);
        if (item) {
            item.date = dateValue;
            saveData();
        }
    }

    // Listeyi render et
    function renderList(category) {
        const container = document.getElementById(`${category}-list`);
        const items = data[category];
        
        if (items.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <div>Henüz öğe eklenmemiş</div>
                </div>
            `;
            return;
        }

        container.innerHTML = items.map((item, index) => `
            <div class="item ${item.completed ? 'completed' : ''}">
                <div class="checkbox" onclick="toggleComplete('${category}', ${item.id})"></div>
                <div class="item-content">
                    <div class="item-title">
                        ${category === 'steps' ? `<span class="step-badge">${index + 1}</span>` : ''}
                        ${escapeHtml(item.title)}
                    </div>
                    ${item.description ? `<div class="item-desc">${escapeHtml(item.description)}</div>` : ''}
                    <div class="date-input">
                        <input type="date" 
                               value="${item.date}" 
                               onchange="updateDate('${category}', ${item.id}, this.value)"
                               placeholder="Uygulandığı tarih">
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteItem('${category}', ${item.id})">Sil</button>
            </div>
        `).join('');
    }

    // Tüm listeleri render et
    function renderAll() {
        ['todo', 'visit', 'buy', 'steps'].forEach(renderList);
    }

    // HTML escape (güvenlik için)
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Enter tuşu ile ekleme
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
            const category = e.target.id.split('-')[0];
            addItem(category);
        }
    });
</script>

</body>
</html>
